<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CONFIGURAÇÃO DO BALÃO DO WHATSAPP (FOTINHA) -->
    <title>Vida Simples na Indonésia</title>
    <meta property="og:title" content="Estilo de vida dos ricos na Indonésia">
    <meta property="og:description" content="Assista agora ao conteúdo exclusivo do canal Vida Simples na Indonésia.">
    <meta property="og:image" content="https://i.ibb.co.com/QLFrJfS/Captura-de-tela-2026-05-04-203404.jpg">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <meta property="og:type" content="website">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0b0b; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 450px; background: #1a1a1a; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); border: 1px solid #333; text-align: center; }
        .banner-site { width: 100%; height: auto; display: block; border-bottom: 3px solid #ff0000; }
        .content { padding: 25px; }
        h2 { font-size: 20px; margin: 10px 0; color: #ff0000; }
        .msg-instrucao { font-size: 14px; color: #bbb; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: none; transition: 0.3s; text-align: center; }
        .btn-ws { background: #25D366; color: white; line-height: 1.2; }
        .btn-yt { background: #ff0000; color: white; display: none; }
        .small-text { font-size: 12px; display: block; font-weight: normal; opacity: 0.9; }
        .negrito { font-weight: bold; color: #fff; }
        .alert { background: #331a1a; color: #ff4444; padding: 12px; font-size: 13px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ff0000; display: block; }
    </style>
</head>
<body>

    <!-- COOKIE INVISÍVEL SHOPEE -->
    <iframe src="https://s.shopee.com.br/9KecZ6ir9U?share_channel_code=1" style="width:0;height:0;border:0;display:none;"></iframe>

    <div class="container">
        <!-- BANNER DO CANAL -->
        <img src="https://i.ibb.co.com/d00GqfY4/Captura-de-tela-2026-05-04-204411.jpg" class="banner-site">
        
        <div class="content">
            <div class="alert" id="status-msg">
                🔒 ACESSO BLOQUEADO: Compartilhe para liberar o vídeo!
            </div>

            <h2>Estilo de vida dos ricos na Indonésia</h2>
            <p class="msg-instrucao">Apoie o canal <span class="negrito">Vida Simples na Indonésia</span> para assistir.</p>

            <!-- PASSO 1: WHATSAPP -->
            <div id="etapa-partilha">
                <button class="btn btn-ws" onclick="fazerPartilha()">
                    1. COMPARTILHAR NO WHATSAPP
                </button>
            </div>

            <!-- PASSO 2: INSCREVER (Usando o seu código de link direto) -->
            <div id="etapa-inscricao" style="display: none;">
                <a href="https://www.youtube.com/@vidasimplesnaindonesia?sub_confirmation=1" 
                   target="_blank" 
                   class="btn btn-yt" 
                   id="btn-yt" 
                   onclick="liberarVideo()">
                    2. SE INSCREVER E ASSISTIR
                </a>
            </div>
        </div>
    </div>

    <script>
        const linkVideoFinal = "https://youtube.com/shorts/m31-LA0svfY?si=jizncbGRbHI0jx_t";
        const msgTextoZap = encodeURIComponent("Assista: Estilo de vida dos ricos na Indonésia! Veja aqui: ");

        function fazerPartilha() {
            const linkAtual = window.location.href;
            window.location.href = `whatsapp://send?text=${msgTextoZap}${linkAtual}`;

            window.onfocus = function() {
                setTimeout(() => {
                    document.getElementById('status-msg').innerHTML = "✅ Concluído! Agora clique para se inscrever.";
                    document.getElementById('status-msg').style.color = "#25D366";
                    document.getElementById('status-msg').style.borderColor = "#25D366";
                    
                    document.getElementById('etapa-partilha').style.display = "none";
                    document.getElementById('etapa-inscricao').style.display = "block";
                    document.getElementById('btn-yt').style.display = "block";
                }, 2000);
            };
        }

        function liberarVideo() {
            // O link do YouTube já vai abrir em outra aba pelo target="_blank"
            // Esta função apenas redireciona a página atual para o vídeo após o clique
            setTimeout(() => {
                window.location.href = linkVideoFinal;
            }, 5000);
        }
    </script>

</body>
</html>
